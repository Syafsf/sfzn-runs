<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Training Log Dashboard V4</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root,[data-theme="light"]{--bg:#f7f6f2;--surface:#f9f8f5;--surface2:#fbfbf9;--border:#d4d1ca;--text:#28251d;--muted:#68665f;--inverse:#f9f8f4;--primary:#01696f;--primary2:#cedcd8;--blue:#006494;--orange:#da7101;--green:#437a22;--purple:#7a39bb;--red:#a13544;--radius:14px;--shadow:0 4px 12px rgba(0,0,0,.07);--fontd:'Boska',Georgia,serif;--fontb:'Satoshi',Inter,sans-serif}
[data-theme="dark"]{--bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--border:#393836;--text:#cdccca;--muted:#9a9894;--inverse:#2b2a28;--primary:#4f98a3;--primary2:#313b3b;--blue:#5591c7;--orange:#fdab43;--green:#6daa45;--purple:#a86fdf;--red:#dd6974;--shadow:0 4px 12px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0} body{font-family:var(--fontb);background:var(--bg);color:var(--text);line-height:1.5} button,input,select,textarea{font:inherit;color:inherit} a{color:inherit}
.topbar{position:sticky;top:0;z-index:10;background:color-mix(in oklab,var(--bg) 86%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar-inner{max-width:1450px;margin:auto;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand h1{font-family:var(--fontd);font-size:1.8rem;line-height:1}.brand p{font-size:.92rem;color:var(--muted)}
.theme-btn,.btn{border:none;border-radius:999px;padding:10px 16px;cursor:pointer;font-weight:700}.theme-btn{background:var(--surface);border:1px solid var(--border)}.btn-primary{background:var(--primary);color:var(--inverse)}.btn-secondary{background:var(--surface2);border:1px solid var(--border)}.btn-sm{padding:4px 10px;font-size:0.8rem}
.wrap{max-width:1450px;margin:auto;padding:18px;display:grid;gap:18px}
.card,.panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow)}.card{padding:16px}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px}@media(max-width:1000px){.layout{grid-template-columns:1fr}}
.panel{padding:16px}.panel h2{font-size:1.2rem;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}.sub{font-size:.92rem;color:var(--muted);margin-bottom:12px}

/* Calendar styling */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cal-nav h3{font-size:1.1rem;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7, 1fr);gap:4px}
.cal-day-header{text-align:center;font-size:0.75rem;text-transform:uppercase;color:var(--muted);font-weight:700;padding-bottom:4px}
.cal-day{aspect-ratio:1/1;border-radius:8px;border:1px solid var(--border);background:var(--surface2);padding:4px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform 0.1s}
.cal-day:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.cal-day.empty{background:transparent;border:1px dashed transparent;cursor:default}
.cal-day.empty:hover{transform:none;box-shadow:none}
.cal-day.active{outline:2px solid var(--primary);outline-offset:2px}
.cal-day[draggable="true"]{cursor:grab}
.cal-day.dragging{opacity:0.4;transform:scale(0.95);outline:2px dashed var(--primary)}
.cal-day.drag-over{background:color-mix(in oklab, var(--primary) 20%, var(--surface2));border:1px dashed var(--primary)}
.cal-date{font-size:0.8rem;font-weight:700}
.cal-label{font-size:0.6rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;padding:2px 4px;border-radius:4px;color:#fff}
.type-Rest{background:#8d8b85} .type-Easy{background:#01696f} .type-Tempo{background:#da7101} .type-Intervals{background:#006494} .type-Long{background:#437a22} .type-Bike{background:#7a39bb} .type-Strength{background:#c47d1a} .type-Race{background:#a13544}
.status-dot{width:8px;height:8px;border-radius:50%;align-self:flex-end;margin-top:2px}
.s-Planned{background:#d4d1ca} .s-Done{background:#437a22} .s-Missed{background:#a13544} .s-Modified{background:#da7101}

/* Grid KPI */
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.grid-kpi .kpi-label{font-size:0.75rem;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:0.05em}

/* Weekly Plan vs Actual */
.weekly-wrap{display:grid;gap:12px;max-height:300px;overflow-y:auto;padding-right:8px}
.week-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px}
.week-header{display:flex;justify-content:space-between;font-size:0.9rem;font-weight:700;margin-bottom:8px}
.week-bar-container{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.week-bar-fill{height:100%;background:var(--primary);transition:width 0.3s}
.week-stats{display:flex;justify-content:space-between;font-size:0.8rem;color:var(--muted)}

.editor{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.field{display:grid;gap:6px}.field label{font-size:.76rem;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:.06em}
.input, select, textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2)}textarea{min-height:88px;resize:vertical}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.info-box{padding:12px;border-radius:14px;background:color-mix(in oklab,var(--primary) 10%,transparent);border-left:4px solid var(--primary);margin-bottom:14px}
.info-box h3{font-size:1rem;margin-bottom:6px} .statsline{display:flex;gap:16px;flex-wrap:wrap;font-size:.9rem}

.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}.chartbox{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px;height:320px}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><div class="brand"><h1>Training Log Dashboard V4</h1><p>Drag & Drop calendar, monthly summaries, and live race countdown.</p></div><button id="themeBtn" class="theme-btn" aria-label="Toggle theme">◑</button></div></header>
<main class="wrap">
<div class="layout">
  <aside style="display:flex;flex-direction:column;gap:18px">
    <!-- Countdown Panel -->
    <div id="raceCountdown" class="info-box" style="background:var(--primary);color:var(--inverse);border:none;text-align:center;margin-bottom:0;display:none;padding:16px"></div>

    <div class="panel">
      <div class="cal-nav">
        <button class="btn btn-secondary btn-sm" id="prevMonth">&lt;</button>
        <h3 id="monthLabel">May 2026</h3>
        <button class="btn btn-secondary btn-sm" id="nextMonth">&gt;</button>
      </div>
      <div class="cal-grid" id="calHeader">
        <div class="cal-day-header">M</div><div class="cal-day-header">T</div><div class="cal-day-header">W</div><div class="cal-day-header">T</div><div class="cal-day-header">F</div><div class="cal-day-header">S</div><div class="cal-day-header">S</div>
      </div>
      <div class="cal-grid" id="calBody"></div>
      <div style="display:flex;gap:8px;margin-top:12px;font-size:0.7rem;color:var(--muted);justify-content:center">
        <div style="display:flex;align-items:center;gap:4px"><div class="status-dot s-Planned"></div>Planned</div>
        <div style="display:flex;align-items:center;gap:4px"><div class="status-dot s-Done"></div>Done</div>
        <div style="display:flex;align-items:center;gap:4px"><div class="status-dot s-Missed"></div>Missed</div>
      </div>
      <p style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:8px;margin-bottom:0"><i>Drag and drop days to reschedule</i></p>
    </div>

    <div class="panel">
      <h2>Weekly Plan vs Actual</h2>
      <div class="weekly-wrap" id="weeklyWrap"></div>
    </div>
  </aside>

  <section style="display:grid;gap:18px;align-content:start">
    <div class="panel" style="padding-bottom:12px">
        <h2 style="margin-bottom:12px;font-size:1.1rem">Monthly Totals (<span id="mtLabel"></span>)</h2>
        <div id="monthlyTotals" class="grid-kpi" style="grid-template-columns: repeat(4, 1fr);"></div>
    </div>

    <section class="panel">
      <h2>Session editor</h2>
      <div id="planInfo" class="info-box"></div>
      <form id="editorForm">
        <div class="editor">
          <div class="field"><label>Date</label><input id="fDate" readonly class="input" /></div>
          <div class="field"><label>Status</label><select id="fStatus" class="input"><option>Planned</option><option>Done</option><option>Missed</option><option>Modified</option></select></div>
          <div class="field"><label>Actual Type</label><select id="fActualType" class="input"></select></div>
          <div class="field"><label>Distance km</label><input id="fDistance" type="number" step="0.01" class="input" /></div>
          <div class="field"><label>Duration min</label><input id="fDuration" type="number" step="1" class="input" /></div>
          <div class="field"><label>Pace min/km</label><input id="fPace" type="number" step="0.01" class="input" /></div>
          <div class="field"><label>Avg HR</label><input id="fAvgHR" type="number" step="1" class="input" /></div>
          <div class="field"><label>Max HR</label><input id="fMaxHR" type="number" step="1" class="input" /></div>
          <div class="field"><label>RPE (1-10)</label><input id="fRPE" type="number" min="1" max="10" step="1" class="input" /></div>
          <div class="field"><label>Bike min</label><input id="fBike" type="number" step="1" class="input" /></div>
          <div class="field"><label>Strength min</label><input id="fStrength" type="number" step="1" class="input" /></div>
          <div class="field" style="grid-column:1/-1"><label>Notes</label><textarea id="fNotes" class="input"></textarea></div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="submit">Save session</button>
          <button class="btn btn-secondary" type="button" id="resetBtn">Reset selected</button>
          <button class="btn btn-secondary" type="button" id="exportBtn">Export CSV</button>
          <button class="btn btn-secondary" type="button" id="clearLocalBtn">Clear browser save</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Progress charts</h2>
      <div class="charts">
        <div class="chartbox"><canvas id="cumChart"></canvas></div>
        <div class="chartbox"><canvas id="mixChart"></canvas></div>
      </div>
    </section>
  </section>
</div>
</main>

function parseNum(v) {
  if(!v) return 0;
  const s = String(v).trim();
  if(/^\d+(\.\d+)?$/.test(s)) return parseFloat(s);
  return 0;
}

function getTypeClass(type) {
  if(!type) return '';
  if(type.includes('Rest')) return 'type-Rest';
  if(type.includes('Easy Run')) return 'type-Easy';
  if(type.includes('Tempo')) return 'type-Tempo';
  if(type.includes('Intervals')) return 'type-Intervals';
  if(type.includes('Long Run')) return 'type-Long';
  if(type.includes('Bike')) return 'type-Bike';
  if(type.includes('Strength')) return 'type-Strength';
  if(type.includes('Race')) return 'type-Race';
  return 'type-Easy';
}

// Drag & Drop Handlers
let draggedDate = null;
function handleDragStart(e, date) {
    draggedDate = date;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => e.target.classList.add('dragging'), 0);
}
function handleDragEnd(e) {
    e.target.classList.remove('dragging');
    draggedDate = null;
}
function handleDrop(e, targetDate) {
    e.preventDefault();
    if(!draggedDate || draggedDate === targetDate) return;

    const srcRow = data.find(r => r.Date === draggedDate);
    const tgtRow = data.find(r => r.Date === targetDate);

    if(srcRow && tgtRow) {
        srcRow.Date = targetDate;
        tgtRow.Date = draggedDate;
    } else if(srcRow && !tgtRow) {
        srcRow.Date = targetDate;
    }

    // Sort array by date
    data.sort((a,b) => a.Date.localeCompare(b.Date));

    // Maintain selection
    selectedIndex = data.findIndex(r => r.Date === targetDate);
    saveLocal();
    renderAll();
}

function renderCalendar() {
  const y = currentMonth.getFullYear();
  const m = currentMonth.getMonth();
  els.monthLabel.textContent = new Intl.DateTimeFormat('en-US', {month:'long', year:'numeric'}).format(currentMonth);

  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m + 1, 0);

  let startDay = firstDay.getDay() - 1; // Mon = 0
  if (startDay === -1) startDay = 6; // Sun

  els.calBody.innerHTML = '';

  // Pad beginning
  for(let i=0; i<startDay; i++) {
    const d = document.createElement('div'); d.className = 'cal-day empty'; els.calBody.appendChild(d);
  }

  for(let day=1; day<=lastDay.getDate(); day++) {
    const dString = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const rIdx = data.findIndex(r => r.Date === dString);
    const cell = document.createElement('div');
    cell.dataset.date = dString;

    // Make all valid month cells droppable targets
    cell.ondragover = e => { e.preventDefault(); cell.classList.add('drag-over'); };
    cell.ondragleave = e => { cell.classList.remove('drag-over'); };
    cell.ondrop = e => { cell.classList.remove('drag-over'); handleDrop(e, dString); };

    if (rIdx > -1) {
      const r = data[rIdx];
      const typeStr = r['Actual Type'] || r['Planned Type'] || '';
      const tClass = getTypeClass(typeStr);
      cell.className = `cal-day ${rIdx===selectedIndex?'active':''}`;
      cell.draggable = true;
      cell.ondragstart = e => handleDragStart(e, dString);
      cell.ondragend = handleDragEnd;
      cell.innerHTML = `<div class="cal-date">${day}</div><div class="cal-label ${tClass}">${typeStr.replace('Run','').replace('Bike','B').trim()}</div><div class="status-dot s-${r.Status||'Planned'}"></div>`;
      cell.onclick = () => { selectedIndex = rIdx; renderAll(); };
    } else {
      cell.className = 'cal-day empty';
      cell.innerHTML = `<div class="cal-date" style="color:var(--border)">${day}</div>`;
    }
    els.calBody.appendChild(cell);
  }
}

  const mData = data.filter(r => {
      const d = new Date(r.Date+'T00:00:00');
      return d.getFullYear() === y && d.getMonth() === m;
  });

  let planKm = 0, doneKm = 0, doneMin = 0, sessions = 0;
  mData.forEach(r => {
      planKm += parseNum(r.Target_Distance);
      if(r.Status === 'Done') {
          doneKm += parseNum(r.Distance_km);
          doneMin += parseNum(r.Duration_min);
          sessions++;
      }
  });

  els.monthlyTotals.innerHTML = `
    <article class="card" style="padding:12px"><div class="kpi-label">Plan Dist</div><div class="kpi-value" style="font-size:1.3rem">${planKm.toFixed(1)} <span style="font-size:0.8rem;font-weight:400;color:var(--muted)">km</span></div></article>
    <article class="card" style="padding:12px"><div class="kpi-label">Done Dist</div><div class="kpi-value" style="font-size:1.3rem;color:var(--primary)">${doneKm.toFixed(1)} <span style="font-size:0.8rem;font-weight:400;color:var(--muted)">km</span></div></article>
    <article class="card" style="padding:12px"><div class="kpi-label">Total Time</div><div class="kpi-value" style="font-size:1.3rem">${doneMin} <span style="font-size:0.8rem;font-weight:400;color:var(--muted)">min</span></div></article>
    <article class="card" style="padding:12px"><div class="kpi-label">Completed</div><div class="kpi-value" style="font-size:1.3rem">${sessions} <span style="font-size:0.8rem;font-weight:400;color:var(--muted)">runs</span></div></article>
  `;
}

function renderRaceCountdown() {
    const today = new Date('2026-05-02T00:00:00');
    const races = data.filter(r => (r['Planned Type']==='Race' || r['Actual Type']==='Race') && new Date(r.Date+'T00:00:00') >= today);
    if(races.length > 0) {
        races.sort((a,b) => a.Date.localeCompare(b.Date));
        const nextRace = races[0];
        const rDate = new Date(nextRace.Date+'T00:00:00');
        const diffDays = Math.ceil((rDate - today) / (1000 * 60 * 60 * 24));
        els.raceCountdown.innerHTML = `
            <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;opacity:0.9">Next Goal Event: ${nextRace.Date}</div>
            <div style="font-size:2.4rem;font-weight:700;line-height:1.2">${diffDays} Days</div>
            <div style="font-size:0.9rem;opacity:0.9">${nextRace.Target_Distance ? nextRace.Target_Distance+'km' : 'Race'} (${nextRace.Phase})</div>
        `;
        els.raceCountdown.style.display = 'block';
    } else {
        els.raceCountdown.style.display = 'none';
    }
}

function renderWeekly() {
  const weeks = {};
  data.forEach((r, i) => {
    const w = r.Week || '0';
    if(!weeks[w]) weeks[w] = { planned:0, done:0, label:`Week ${w} (${r.Phase||''})`, active:false };
    weeks[w].planned += parseNum(r.Target_Distance);
    if(r.Status === 'Done') weeks[w].done += parseNum(r.Distance_km);
    if(i === selectedIndex) weeks[w].active = true;
  });

  els.weeklyWrap.innerHTML = Object.keys(weeks).sort((a,b)=>Number(a)-Number(b)).map(w => {
    const p = weeks[w].planned;
    const d = weeks[w].done;
    const pct = p>0 ? Math.min((d/p)*100, 100) : 0;
    const bg = weeks[w].active ? 'style="border-color:var(--primary)"' : '';
    return `
      <div class="week-card" ${bg}>
        <div class="week-header"><span>${weeks[w].label}</span><span>${pct.toFixed(0)}%</span></div>
        <div class="week-bar-container"><div class="week-bar-fill" style="width:${pct}%"></div></div>
        <div class="week-stats"><span>Plan: ${p.toFixed(1)}km</span><span>Done: ${d.toFixed(1)}km</span></div>
      </div>
    `;
  }).join('');

  setTimeout(() => {
    const active = els.weeklyWrap.querySelector('[style*="border-color"]');
    if(active) active.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 10);
}

function renderEditor() {
  const r = data[selectedIndex]; if(!r) return;
  els.planInfo.innerHTML = `<h3>${r['Planned Type'] || 'Session'} · ${r.Phase || ''} · Week ${r.Week || ''}</h3><div class="statsline"><span><strong>Target distance:</strong> ${r.Target_Distance || '—'}</span><span><strong>Target pace:</strong> ${r.Target_Pace || '—'}</span><span><strong>Current status:</strong> ${r.Status || 'Planned'}</span></div><div class="note" style="margin-top:8px">Use this form to log what you actually did for the day. ${r.Notes ? '<i>Plan Note: '+r.Notes+'</i>':''}</div>`;
  els.fDate.value = r.Date || '';
  els.fStatus.value = r.Status || 'Planned';
  els.fActualType.value = r['Actual Type'] || r['Planned Type'] || '';
  els.fDistance.value = r.Distance_km || '';
  els.fDuration.value = r.Duration_min || '';
  els.fPace.value = r.Pace_min_per_km || '';
  els.fAvgHR.value = r.Avg_HR || '';
  els.fMaxHR.value = r.Max_HR || '';
  els.fRPE.value = r.RPE || '';
  els.fBike.value = r.Bike_Duration_min || '';
  els.fStrength.value = r.Strength_min || '';
  els.fNotes.value = r.Notes || '';

  const d = new Date(r.Date + 'T00:00:00');
  if(d.getMonth() !== currentMonth.getMonth() || d.getFullYear() !== currentMonth.getFullYear()) {
    currentMonth = d;
  }
}

function chartTextColor() { return getComputedStyle(document.documentElement).getPropertyValue('--text').trim(); }
function chartGridColor() { return 'rgba(127,127,127,.18)'; }

function renderCharts() {
  if(cumChart) cumChart.destroy();
  if(mixChart) mixChart.destroy();

  const textColor = chartTextColor();
  const labels = data.map(r => r.Date.slice(5));
  let cp=0, cd=0; const planLine=[], doneLine=[];
  data.forEach(r => {
    cp += parseNum(r.Target_Distance);
    cd += (r.Status==='Done') ? parseNum(r.Distance_km) : 0;
    planLine.push(cp); doneLine.push(cd);
  });

  cumChart = new Chart(document.getElementById('cumChart'), {
    type:'line',
    data:{labels, datasets:[
      {label:'Planned km', data:planLine, borderColor:'#b8b4ad', borderDash:[6,4], pointRadius:0},
      {label:'Done km', data:doneLine, borderColor:getComputedStyle(document.documentElement).getPropertyValue('--primary').trim(), backgroundColor:'rgba(1,105,111,.12)', fill:true, pointRadius:0}
    ]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{title:{display:true,text:'Cumulative progress',color:textColor}, legend:{labels:{color:textColor}}}, scales:{x:{ticks:{color:textColor,maxTicksLimit:12},grid:{display:false}}, y:{ticks:{color:textColor},grid:{color:chartGridColor()}}}}
  });

  const mix = {};
  data.filter(r => r.Status==='Done').forEach(r => { const t = r['Actual Type'] || r['Planned Type'] || 'Other'; mix[t] = (mix[t]||0)+1; });
  mixChart = new Chart(document.getElementById('mixChart'), {
    type:'doughnut',
    data:{labels:Object.keys(mix), datasets:[{data:Object.values(mix), backgroundColor:['#01696f','#da7101','#006494','#437a22','#7a39bb','#a13544','#8d8b85']}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{title:{display:true,text:'Completed workout mix',color:textColor}, legend:{position:'bottom', labels:{color:textColor,usePointStyle:true}}}}
  });
}

function saveLocal() { localStorage.setItem(storageKey, JSON.stringify(data)); }

function renderAll() {
  renderEditor(); 
  renderCalendar();
  renderMonthlyTotals();
  renderRaceCountdown();
  renderWeekly();
  renderCharts();
}

els.editorForm.addEventListener('submit', e => {
  e.preventDefault();
  const r = data[selectedIndex];
  r.Status = els.fStatus.value;
  r['Actual Type'] = els.fActualType.value;
  r.Distance_km = els.fDistance.value;
  r.Duration_min = els.fDuration.value;
  r.Pace_min_per_km = els.fPace.value;
  r.Avg_HR = els.fAvgHR.value;
  r.Max_HR = els.fMaxHR.value;
  r.RPE = els.fRPE.value;
  r.Bike_Duration_min = els.fBike.value;
  r.Strength_min = els.fStrength.value;
  r.Notes = els.fNotes.value;

  const target = parseNum(r.Target_Distance);
  if(target && r.Distance_km) {
    r.Variance_Distance = (Number(r.Distance_km) - target).toFixed(2);
    r['Goal_Progress_%'] = ((Number(r.Distance_km) / target) * 100).toFixed(1);
  }
  saveLocal(); renderAll();
});

els.prevMonth.addEventListener('click', () => { currentMonth.setMonth(currentMonth.getMonth()-1); renderAll(); });
els.nextMonth.addEventListener('click', () => { currentMonth.setMonth(currentMonth.getMonth()+1); renderAll(); });

els.resetBtn.addEventListener('click', () => { data[selectedIndex] = JSON.parse(JSON.stringify(initialData[selectedIndex])); saveLocal(); renderAll(); });
els.clearLocalBtn.addEventListener('click', () => { localStorage.removeItem(storageKey); data = JSON.parse(JSON.stringify(initialData)); renderAll(); });
els.exportBtn.addEventListener('click', () => {
  const headers = Object.keys(data[0]);
  const esc = v => '"' + String(v ?? '').replaceAll('"', '""') + '"';
  const csv = [headers.join(','), ...data.map(r => headers.map(h => esc(r[h])).join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'updated_training_log_2026.csv'; a.click(); URL.revokeObjectURL(url);
});

let dark=false; els.themeBtn.addEventListener('click', () => { dark=!dark; document.documentElement.setAttribute('data-theme', dark?'dark':'light'); renderCharts(); });
renderAll();
</script>
</body>
</html>
